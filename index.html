<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>當鋪排班表</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero compact-card">
      <div>
        <p class="eyebrow">Pawn Shop Scheduling</p>
        <h1>排班表</h1>
        <p class="subtext">產生目前查看週的完整班表；A、B、D 組人員固定不換組，整組依早中晚班輪替。</p>
      </div>
      <div class="hero-card">
        <span>目前狀態</span>
        <strong id="stateLabel">Idle</strong>
      </div>
    </header>

    <section class="top-grid">
      <section class="panel people-panel compact-card">
        <div class="panel-title-row compact-title">
          <div>
            <h2>人員管理</h2>
            <p>可依組別查看，並在同組內上移、下移調整輪調順序。</p>
          </div>
        </div>

        <form id="personForm" class="person-form" autocomplete="off">
          <label>
            人員姓名
            <input id="personName" type="text" maxlength="30" placeholder="輸入姓名" required />
          </label>

          <fieldset>
            <legend>所屬組別</legend>
            <label><input type="radio" name="group" value="A" checked /> A組</label>
            <label><input type="radio" name="group" value="B" /> B組</label>
            <label><input type="radio" name="group" value="D" /> D組</label>
          </fieldset>

          <button type="submit" class="primary-btn">新增人員</button>
        </form>

        <div class="filter-bar small-filter" aria-label="人員組別篩選">
          <button type="button" class="people-filter-btn active" data-people-filter="ALL">所有人</button>
          <button type="button" class="people-filter-btn" data-people-filter="A">A組</button>
          <button type="button" class="people-filter-btn" data-people-filter="B">B組</button>
          <button type="button" class="people-filter-btn" data-people-filter="D">D組</button>
        </div>

        <div class="toolbar compact-toolbar">
          <button id="seedButton" type="button">建立範例人員</button>
          <button id="clearPeopleButton" type="button" class="danger-text">清除人員</button>
        </div>

        <div id="peopleList" class="people-list"></div>
      </section>

      <section class="panel control-panel compact-card">
        <div class="panel-title-row compact-title">
          <div>
            <h2>班表控制</h2>
            <p id="weekLabel">選擇日期後，會顯示該週週一到週六。</p>
          </div>
          <label class="date-box">
            查看日期
            <input id="scheduleDate" type="date" />
          </label>
        </div>

        <div class="rules-card compact-rules">
          <strong>站班規則</strong>
          <p>每週整組往下一班輪替。若本週已有班表，重新產生前會先確認；在單組模式時只重新產生該組。</p>
        </div>

        <div class="schedule-actions compact-toolbar">
          <button id="prevWeekButton" type="button">上一週</button>
          <button id="nextWeekButton" type="button">下一週</button>
          <button id="generateButton" type="button" class="primary-btn">產生本週排班</button>
          <button id="copyButton" type="button">複製文字</button>
          <button id="exportButton" type="button">下載 CSV</button>
          <button id="clearScheduleButton" type="button" class="danger-text">清除本週排班</button>
        </div>

        <div class="filter-bar" aria-label="班表組別篩選">
          <button type="button" class="filter-btn active" data-filter="ALL">所有人</button>
          <button type="button" class="filter-btn" data-filter="A">A組</button>
          <button type="button" class="filter-btn" data-filter="B">B組</button>
          <button type="button" class="filter-btn" data-filter="D">D組</button>
        </div>

        <div id="messageBox" class="message-box" role="status"></div>
      </section>
    </section>

    <section class="panel schedule-panel schedule-fixed">
      <div id="scheduleTable" class="schedule-table"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
