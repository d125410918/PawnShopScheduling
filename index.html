<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>當鋪排班表</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Pawn Shop Scheduling</p>
        <h1>當鋪排班表</h1>
        <p class="subtext">每天獨立隨機排班，每人一小時，12 小時分三組，優先安排最新加入人員。</p>
      </div>
      <div class="hero-card">
        <span>目前狀態</span>
        <strong id="stateLabel">Idle</strong>
      </div>
    </header>

    <section class="layout-grid">
      <section class="panel">
        <div class="panel-title-row">
          <div>
            <h2>人員管理</h2>
            <p>新增人員時請指定組別；下方清單可停用或刪除人員。</p>
          </div>
        </div>

        <form id="personForm" class="person-form" autocomplete="off">
          <label>
            人員姓名
            <input id="personName" type="text" maxlength="30" placeholder="輸入姓名" required />
          </label>

          <fieldset>
            <legend>所屬組別</legend>
            <label><input type="radio" name="group" value="A" checked /> A組 09:00～13:00</label>
            <label><input type="radio" name="group" value="B" /> B組 13:00～17:00</label>
            <label><input type="radio" name="group" value="C" /> C組 17:00～21:00</label>
          </fieldset>

          <button type="submit" class="primary-btn">新增人員</button>
        </form>

        <div class="toolbar">
          <button id="seedButton" type="button">建立範例人員</button>
          <button id="clearPeopleButton" type="button" class="danger-text">清除人員</button>
        </div>

        <div id="peopleList" class="people-list"></div>
      </section>

      <section class="panel schedule-panel">
        <div class="panel-title-row">
          <div>
            <h2>每日排班</h2>
            <p>每一天都獨立產生，不沿用前一天結果。</p>
          </div>
          <label class="date-box">
            日期
            <input id="scheduleDate" type="date" />
          </label>
        </div>

        <div class="rules-card">
          <strong>排班規則</strong>
          <p>每組各排 4 小時；每個時段只抽該組啟用人員。最新加入前 3 名會提高抽中權重。組內人數足夠時，同一天盡量不重複。</p>
        </div>

        <div class="schedule-actions">
          <button id="generateButton" type="button" class="primary-btn">產生排班</button>
          <button id="copyButton" type="button">複製文字</button>
          <button id="exportButton" type="button">下載 CSV</button>
          <button id="clearScheduleButton" type="button" class="danger-text">清除當日排班</button>
        </div>

        <div id="messageBox" class="message-box" role="status"></div>
        <div id="scheduleTable" class="schedule-table"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
